name: Deploy Website

# When this fires:
#   - push to main          — normal flow, embeds Fishbones by default
#   - schedule (nightly)    — picks up upstream Fishbones changes within
#                             24h even if mattssoftware itself hasn't
#                             been touched
#   - repository_dispatch   — kata's notify-marketing workflow fires
#                             this when its main pushes, so a Fishbones
#                             commit redeploys the marketing site
#                             within minutes
#   - workflow_dispatch     — manual run-this-now button in the Actions
#                             UI; the embed_fishbones input lets you
#                             skip the kata build if it's broken
on:
  push:
    branches: [main]
  schedule:
    # 04:17 UTC nightly — slightly off the hour to dodge GitHub's
    # ":00" cron stampede that delays scheduled jobs by ~10-15min.
    - cron: "17 4 * * *"
  repository_dispatch:
    types: [fishbones-updated]
  workflow_dispatch:
    inputs:
      embed_fishbones:
        description: |
          Build + embed the Fishbones web variant under /fishbones/learn/.
          Default true: the deploy checks out Fishbones, runs the web
          build, and stages dist-web/ under
          public/fishbones/learn/. Flip to false to fall back to the
          coming-soon landing page that ships in the repo (e.g. if
          the upstream build is temporarily broken).
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight pipeline per branch. New pushes cancel the prior
# run rather than queueing — wastes less compute and avoids one
# stale build clobbering a newer one.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout marketing site
        uses: actions/checkout@v4

      # Pull the upstream Fishbones repo for the web build. Public
      # repo + GITHUB_TOKEN works without extra secrets. Skipped
      # only when the manual dispatch explicitly opts out.
      - name: Checkout Fishbones (web app source)
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/Fishbones
          path: fishbones
          ref: main

      # Fishbones depends on `@mattmattmattmatt/base` via a relative
      # `file:../../Libs/base` path. The repo lives at
      # github.com/InfamousVague/base; we check it out into the
      # workspace and symlink it into the layout the file: dep
      # resolves to (/home/runner/work/Libs/base/). Same treatment
      # the kata CI workflow uses.
      - name: "Checkout @mattmattmattmatt/base (Fishbones file: dep)"
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        uses: actions/checkout@v4
        with:
          repository: InfamousVague/base
          path: _base
          ref: main

      - name: "Symlink _base/ into Libs/base/ for the file: dep"
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        run: |
          # Fishbones package.json declares file:../../Libs/base,
          # resolved relative to fishbones/package.json. With fishbones
          # checked out at $GITHUB_WORKSPACE/fishbones/ (where
          # $GITHUB_WORKSPACE = /home/runner/work/mattssoftware/mattssoftware),
          # the file: dep `../../Libs/base` resolves to
          # /home/runner/work/mattssoftware/Libs/base — i.e. ONE level
          # ABOVE the workspace, not inside it.
          target_dir="$(dirname "$GITHUB_WORKSPACE")/Libs"
          mkdir -p "$target_dir"
          ln -sfn "$GITHUB_WORKSPACE/_base" "$target_dir/base"
          test -d "$target_dir/base/primitives" \
            || (echo "Libs/base/primitives missing at $target_dir — symlink wiring is wrong"; exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # Cache mattssoftware's lockfile keyed on its
          # package-lock.json so npm ci is near-instant on cache hit.
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install marketing site deps
        run: npm ci

      # Separate npm-cache step for the Fishbones checkout — the
      # setup-node cache only covers one lockfile, and Fishbones'
      # install is the slowest part of the pipeline (~45s cold,
      # ~5s warm with cache).
      - name: Cache Fishbones npm
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: fishbones-npm-${{ hashFiles('fishbones/package-lock.json') }}
          restore-keys: |
            fishbones-npm-

      - name: Cache Fishbones build artifacts
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        uses: actions/cache@v4
        with:
          # vite-bundled vendor assets and the fetched node sidecar
          # don't change between deploys unless the Fishbones lockfile
          # does. Caching them shaves another ~30s off cold builds.
          path: |
            fishbones/src-tauri/resources/vendor
            fishbones/src-tauri/.cache
          key: fishbones-build-${{ hashFiles('fishbones/package-lock.json', 'fishbones/scripts/vendor-cdn-deps.mjs') }}
          restore-keys: |
            fishbones-build-

      # ImageMagick (the `convert` / `magick` binaries) is what kata's
      # extract-starter-courses.mjs uses to resize cover art — without
      # it, the script silently skips covers and the deployed library
      # falls back to language-tinted glyph tiles. Ubuntu-latest's
      # default image doesn't include it.
      - name: Install ImageMagick (for cover-art resize)
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick

      - name: Build + embed Fishbones web variant
        if: ${{ github.event.inputs.embed_fishbones != 'false' }}
        env:
          FISHBONES_SRC: ${{ github.workspace }}/fishbones
        run: |
          cd fishbones
          npm ci
          cd ..
          npm run sync:fishbones

      - name: Build marketing site
        run: npm run build

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # Production deploy lives on the Vultr VPS (149.28.120.197),
      # served by Caddy from /var/www/mattssoftware. GitHub Pages is
      # the secondary mirror at infamousvague.github.io/mattssoftware/.
      #
      # ─── One-time setup required ────────────────────────────────
      # gh secret set VPS_SSH_PASSWORD --repo InfamousVague/mattssoftware --body '<password>'
      #
      # When the secret is unset the rsync step short-circuits with a
      # warning (forks, public-repo dry runs) so the workflow stays
      # green for non-owners.
      - name: Sync to VPS (Caddy host)
        env:
          VPS_HOST: 149.28.120.197
          VPS_USER: root
          VPS_PORT: "22"
          VPS_TARGET_DIR: /var/www/mattssoftware
          # sshpass reads password from $SSHPASS via the -e flag, so
          # naming the env var SSHPASS keeps the invocation tidy and
          # avoids leaking the password through the process command
          # line.
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
        run: |
          if [ -z "${SSHPASS}" ]; then
            echo "::warning::VPS_SSH_PASSWORD secret not set — skipping VPS sync. Site only updates on GitHub Pages mirror."
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass rsync
          # --delete keeps the remote in lockstep with our dist/,
          # including removing files the build dropped from a
          # previous version.
          sshpass -e rsync -a --delete \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p ${VPS_PORT}" \
            dist/ \
            "${VPS_USER}@${VPS_HOST}:${VPS_TARGET_DIR}/"
          echo "Synced dist/ to ${VPS_USER}@${VPS_HOST}:${VPS_TARGET_DIR}/"
