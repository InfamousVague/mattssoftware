<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fishbones</title>
    <!-- Pre-React preloader. The main bundle + Monaco take ~1s to parse
         on a cold launch and React's bootloader can't paint until the
         module graph resolves — so without this inline block the user
         stares at a black window. The markup mirrors the FishbonesLoader
         component so there's no visual jump on swap; App mounts over
         #root and the preloader is hidden via a CSS rule that keys off
         `body.is-booted`. App.tsx flips that class inside its mount
         effect (see src/main.tsx). -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #eaeaea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      #preloader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        z-index: 9999;
        background: #0a0a0a;
        color: #eaeaea;
        transition: opacity 0.25s ease, visibility 0s linear 0.25s;
      }
      body.is-booted #preloader {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader-stack {
        position: relative;
        width: 88px;
        height: 88px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #preloader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.12);
        border-top-color: #eaeaea;
        animation: preloader-spin 1.1s linear infinite;
      }
      #preloader-logo {
        width: 48px;
        height: 48px;
        background: #eaeaea;
        -webkit-mask: url("/fishbones/learn/fishbones.png") no-repeat center / contain;
        mask: url("/fishbones/learn/fishbones.png") no-repeat center / contain;
        animation: preloader-pulse 1.8s ease-in-out infinite;
      }
      #preloader-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        opacity: 0.55;
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes preloader-pulse {
        0%, 100% { opacity: 0.9; transform: scale(1); }
        50%      { opacity: 0.5; transform: scale(0.94); }
      }
    </style>
    <script type="module" crossorigin src="/fishbones/learn/assets/index-J8T35yvt.js"></script>
    <link rel="modulepreload" crossorigin href="/fishbones/learn/assets/monaco-CtMbGYuv.js">
    <link rel="stylesheet" crossorigin href="/fishbones/learn/assets/monaco-DGSp62OB.css">
    <link rel="stylesheet" crossorigin href="/fishbones/learn/assets/index-DumF6jZV.css">
  </head>
  <body>
    <div id="preloader" role="status" aria-label="Loading Fishbones">
      <div id="preloader-stack" aria-hidden="true">
        <div id="preloader-ring"></div>
        <div id="preloader-logo"></div>
      </div>
      <div id="preloader-label">loading Fishbones…</div>
    </div>
    <div id="root"></div>
  </body>
</html>
